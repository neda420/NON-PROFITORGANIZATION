worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens off;

    # Security headers applied globally
    add_header X-Content-Type-Options   "nosniff"          always;
    add_header X-Frame-Options          "SAMEORIGIN"        always;
    add_header X-XSS-Protection         "1; mode=block"     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://stackpath.bootstrapcdn.com https://code.jquery.com; style-src 'self' https://cdn.jsdelivr.net https://stackpath.bootstrapcdn.com 'unsafe-inline'; img-src 'self' data: https://www.google.com; frame-src https://www.google.com;" always;

    include /etc/nginx/http.d/*.conf;
}
