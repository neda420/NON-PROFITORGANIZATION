name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Restrict default GITHUB_TOKEN permissions to read-only.
permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────
  # 1. PHP syntax check + lint
  # ──────────────────────────────────────────────────────────
  php-lint:
    name: PHP Syntax & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: phpcs

      - name: Syntax check all PHP files
        run: |
          find . -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./node_modules/*" \
            | xargs -I{} php -l {}

      - name: PHP_CodeSniffer (PSR-12)
        run: |
          phpcs --standard=PSR12 \
                --extensions=php \
                --ignore=vendor/ \
                --warning-severity=0 \
                .

      - name: Run smoke tests
        run: php tests/smoke.php

  # ──────────────────────────────────────────────────────────
  # 2. Security audit
  # ──────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Install Psalm (static analysis + taint analysis)
        run: composer require --dev vimeo/psalm psalm/plugin-phpunit --no-interaction --no-progress 2>/dev/null || true

      - name: Run grep-based security checks
        # Quickly detect obvious remaining anti-patterns:
        # hardcoded credentials, var_dump leaks, SQL interpolation.
        run: |
          echo "=== Checking for hardcoded DB passwords ==="
          ! grep -rn --include="*.php" \
            -E '(\$password_db|\$password)\s*=\s*"[^"]+"' \
            --exclude-dir=vendor . \
            | grep -v '\.env' \
            | grep -v 'password_hash' \
            | grep -v 'password_verify' \
            || (echo "WARNING: Possible hardcoded credentials found" && exit 0)

          echo "=== Checking for debug output (var_dump / print_r) ==="
          ! grep -rn --include="*.php" \
            -E '^\s*(var_dump|print_r|var_export)\(' \
            --exclude-dir=vendor . \
            || (echo "FAIL: Debug output found" && exit 1)

          echo "=== Checking for SQL string interpolation ==="
          ! grep -rn --include="*.php" \
            -E '"(SELECT|INSERT|UPDATE|DELETE).*\$' \
            --exclude-dir=vendor . \
            || (echo "FAIL: Possible SQL injection via string interpolation" && exit 1)

          echo "All security checks passed."

  # ──────────────────────────────────────────────────────────
  # 3. Docker build smoke test
  # ──────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Copy env example for build
        run: cp .env.example .env

      - name: Build Docker image
        run: docker build -t helping-paws:ci .

      - name: Verify container starts
        run: |
          docker run -d --name hp_test \
            -e DB_HOST=127.0.0.1 \
            -e DB_PORT=3306 \
            -e DB_NAME=helping_paws2 \
            -e DB_USERNAME=root \
            -e DB_PASSWORD=test \
            -e APP_ENV=development \
            -e SESSION_SECURE=false \
            -p 8099:80 \
            helping-paws:ci
          sleep 5
          docker ps | grep hp_test
          docker stop hp_test
          docker rm hp_test
