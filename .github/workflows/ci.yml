name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────
  # Validate HTML files
  # ──────────────────────────────────────────────────────────
  html-validate:
    name: HTML Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate HTML files
        run: |
          html-validate \
            --formatter stylish \
            $(find . -name "*.html" -not -path "./node_modules/*") \
          || true
